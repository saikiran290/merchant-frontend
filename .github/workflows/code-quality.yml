name: Code Quality & Security

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint with detailed report
        run: |
          npm run lint -- --format json > lint-report.json || true
          cat lint-report.json

      - name: Upload ESLint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: lint-report.json

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run npm audit
        run: npm audit --production 2>&1 | tee npm-audit.log || true

      - name: Check for critical vulnerabilities
        run: |
          if npm audit --production 2>&1 | grep -q "critical"; then
            echo "⚠️ Critical vulnerabilities found!"
            npm audit --production
            exit 1
          else
            echo "✅ No critical vulnerabilities"
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit.log

  dependency-check:
    name: Check Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check for outdated packages
        run: npm outdated 2>&1 | tee outdated-packages.log || true

      - name: Verify package-lock consistency
        run: npm ci --dry-run

      - name: Upload outdated packages report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: outdated-packages-report
          path: outdated-packages.log

  lighthouse:
    name: Performance Analysis (Lighthouse)
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request && contains(github.event.pull_request.labels.*.name, 'performance') }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run React DevTools Analysis
        run: |
          echo "For Expo apps, Lighthouse provides limited insights"
          echo "Use: expo diagnostics for detailed insights"
          npx expo diagnostics || true

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npm test -- --coverage 2>/dev/null || echo "⚠️ No test framework configured yet"
        continue-on-error: true

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

  summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [code-quality, security, dependency-check]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## Code Quality & Security Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Code Quality**: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security**: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dependencies**: ${{ needs.dependency-check.result }}" >> $GITHUB_STEP_SUMMARY
